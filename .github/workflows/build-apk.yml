name: Build Android APK
on:
  workflow_dispatch:
  push:
    branches: [main]
jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: npm install
      - run: npx expo prebuild -p android --no-install
      - name: Add missing splash color
        run: |
          mkdir -p android/app/src/main/res/values
          cat > android/app/src/main/res/values/splash_fix.xml <<'XML'
          <resources>
              <color name="splashscreen_background">#0B1220</color>
          </resources>
          XML
      - name: Build release APK
        run: chmod +x android/gradlew && cd android && ./gradlew assembleRelease --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: nepse-analyzer-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
